<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">

    <style>
        *{
            padding: 0px;
            margin: 0px;
            box-sizing: border-box;
            cursor: alias;
        }

        body{
            background-color: #f5f5f5;
            font-family: "Noto Sans KR", sans-serif;
            font-weight: 500;
            padding-top: 60px;
        }

        .navbar{
            display: flex;
            justify-content: center; /*모든요소 가운데*/
            justify-content: flex-start; /*모든요소 앞쪽 정렬*/
            justify-content: space-between; /*각 요소를 양쪽 끝을 기준으로 균등하게*/

            background-color: #333;
            color: white;
            display: flex;
            height: 60px;
            padding: 10px;

        }

        ul, pl{
                list-style: none;
            }

        .menu{
            display: flex;
            gap: 20px;
        }

        .menu > li{
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
            }
        
        .menu > li:hover{
            scale: calc(0.98);
            opacity: 0.8;
        }

        .flex-center{
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cards{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 30px;
        }

        .card{
            width: 250px;
            padding: 20px;
            background-color: white;
            border: 1px solid #777;
            border-radius: 12px 0px;
            /* box-shadow : x축 y축 흐림정도 색상;*/
            box-shadow: 2px 2px 4px rgb(150, 150, 150);
            /*transition: 변화속성, 몇초간 어떤느낌으로;*/
            transition: all 0.3s ease;
        }

        .card:hover{
            transform: translateY(-5px);
            box-shadow: 3px 3px 4px rgb(50,50,50);
        }

        /*화면 넓이가 768px까지는 아래의 효과를 적용*/
        @media (max-width: 758px) {
            .cards{
                flex-direction: column;
            }
        }

        /*노트북 & 태블릿 가로 : 1024px-1279px*/
        @media all and (min-width:1024px) and (max-width:1279px){
    	    
        }

        /*태블릿 가로 : 769px-1023px*/
        @media all and (min-width:768px) and (max-width:1023px){
            
        }

        /*모바일 가로 & 태블릿 세로 : 480px-767px*/
        @media all and (min-width:480px) and (max-width:767px){
          
        }

        /*모바일 : -479px*/
        @media all and (max-width:479px){
           
        }

    </style>
           
</head>
<body>
    
    <nav class="navbar">
        <div class="logo flex-center">MyLogo</div>
        <ul class="menu">
            <li>홈</li>
            <li>소개</li>
            <li>서비스</li>
            <li>문의</li>
        </ul>
    </nav>

    <div class="cards">
        <div class="card">
            <h3>카드1</h3>
            <p>마우스 올리면 카드 떠오르고 그림자 진해지기</p>
        </div>
        <div class="card">
            <h3>카드2</h3>
            <p>flex + gap으로 나란히 배치하기</p>
        </div>
        <div class="card">
            <h3>카드3</h3>
            <p>창 너비를 768px이하로 줄이면 세로로 정렬변경</p>
        </div>
    </div>

</body>
</html>
