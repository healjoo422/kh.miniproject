<!-- ==========================================
    [ 문제 8 ] 회원가입 폼 완성하기
    ==========================================
    아래 조건에 맞는 회원가입 form을 만드세요.

    form 조건:
    - action="/signup", method="post"

    입력 항목 (모두 label로 감싸거나 label과 연결):
    1. 아이디     : type="text",     name="username",  required, placeholder="아이디 입력"
    2. 비밀번호   : type="password", name="password",  required, placeholder="비밀번호 입력"
    3. 이메일     : type="email",    name="email",     placeholder="이메일 입력"
    4. 생년월일   : type="date",     name="birth"
    5. 성별 (radio): name="gender", 남자/여자 2가지, 남자를 기본 checked
    6. 관심분야 (checkbox): name="interest", 3가지 이상 자유롭게 (예: 프로그래밍, 디자인, 게임)
    7. 자기소개   : textarea, name="intro", rows="4", cols="40", placeholder="자기소개를 입력하세요"
    8. 언어 선택  : select, name="language", 옵션 3가지 (한국어/영어/일본어)
    9. 제출 버튼  : type="submit", 텍스트는 "가입하기"
    10. 초기화 버튼: type="reset",  텍스트는 "다시 입력"

    각 항목 사이에 br 태그로 줄바꿈 해주세요.
    =========================================== -->

        <h2>회원가입</h2>
         <!-- 여기에 코드를 작성하세요 -->
         <form action="/signup" method="post">
            <label for="username">아이디:</label>
            <input type="text" id="username" name="username" required placeholder="아이디 입력">
            <br>

            <label for="password">비밀번호:</label>
            <input type="password" id="password" name="password" required placeholder="비밀번호 입력">
            <br>

            <label for="email">이메일:</label>
            <input type="email" id="email" name="email" placeholder="이메일 입력">
            <br>
 
            <label for="birth">생년월일:</label>
            <input type="date" id="birth" name="birth">
            <br>
 
            <span>성별:</span>
            <label><input type="radio" name="gender" value="male" checked> 남자</label>
            <label><input type="radio" name="gender" value="female"> 여자</label>
            <br>

            <span>관심분야:</span>
            <label><input type="checkbox" name="interest" value="programming"> 프로그래밍</label>
            <label><input type="checkbox" name="interest" value="design"> 디자인</label>
            <label><input type="checkbox" name="interest" value="game"> 게임</label>
            <br>

            <label for="intro">자기소개:</label>
            <textarea id="intro" name="intro" rows="4" cols="40" placeholder="자기소개를 입력하세요"></textarea>
            <br>

            <label for="language">언어 선택:</label>
            <select id="language" name="language">
                <option value="ko">한국어</option>
                <option value="en">영어</option>
                <option value="ja">일본어</option>
            </select>
            <br>
 
            <button type="submit">가입하기</button>
            <button type="reset">다시 입력</button>
        </form>
