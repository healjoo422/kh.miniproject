<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }

        body{
            background-color: #f5f5f5;
            font-family: "Noto Sans KR", sans-serif;
            font-weight: 500;
            height: 3000px;
            padding-top: 55px;
        }

        .header{
            width: 100%;
            height: 50px;
            background-color: #3f63bf;
            color: white;
            text-align: center;
            line-height: 50px;
            position: fixed; /* 위치기준을 viewport로 고정*/
            top: 0;
            left: 0;
        }

        /*content/padding/border/margin*/
        /*기본적으로 요소 크기에 반영되는 size에는 content/padding/border가 더해짐*/
        .box{
            width: 200px;
            height: 80px;
            padding: 20px;
            margin: 10px;
            background-color: rgb(175, 208, 238);
            border: 2px solid #e02d2d;   
        }

        /* box-sizing: border-box 를 사용하면 총 크기에 content/padding/border가 포함됨*/
        .box2{
            width: 200px;
            height: 80px;
            padding: 20px;
            margin: 10px;
            background-color: rgb(175, 208, 238);
            border: 2px solid #e02d2d;  
            box-sizing: border-box;
        }

        /*inline 요소는 크기가 컨텐츠에 딱 맞게 설정되며, 기본적으로 조절 X*/
        /*display 속성을 inline-block으로 바꾸면 자동으로 조절되면서 + 필요할때 수동으로 크기 지정가능*/
        .inline-box{
            width: 120px;
            display: inline-block;
            text-align: center;
            line-height: 60px;
            background-color: #f3f184;
        }

        .hidden{
            display: none;
        }

        .card{
            position: relative;
            width: 300px;
            padding: 20px;
            border: 1px solid #111;
            margin: 20px auto;
            background-color: white;
        }

        .badge{
            position: absolute;
            top: 7px;
            right: 14px;
            
        }

        .phone{
            position: relative;
            top: -10px;
            left: 0px;
        }

    </style>
</head>
<body>
    <h2>Box Model</h2>
    <div class="header">스크롤을 해도 고정되는 헤더</div>

    <div class="box">(content + padding + border) + margin</div>
    <div class="box2">box-sizing: border-box</div>

    <h2>display : inline-block</h2>
    <span class="inline-box">박스 A</span>
    <span class="inline-box">박스 B</span>
    <span class="inline-box">박스 C</span>
    <span class="hidden">숨겨진 컨텐츠</span>

    <h2>position : relative + absolute</h2>
    <div class="card">
        <span class="badge">New</span>
        <h2>profile card</h2>
        <p>relative 부모안에서 absolute자식이 오른쪽 위에 배치됨</p>
        <span class="phone">p/h : 010 - xxxx - xxxx</span>
    </div>
</body>
</html>
