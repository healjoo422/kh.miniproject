<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
        .area {
            border: 1px solid #000;
            min-height: 50px;
            padding: 10px;
            margin: 3px;
        }
    </style>
</head>
<body>
    <h3>실행시점</h3>
    <script>
        $(function() {
            console.log("DOM 준비 완료");
        });
    </script>

    <h3>선택자와 스타일</h3>
    <p class="txt">문단1</p>
    <p class="txt">문단2</p>
    <h5 id="css-box">ㅁㄴㅇ</h5>
    <button id="css-btn">버튼</button>
    <script>
        $(function(){
            // $(선택자)
            console.log($(".txt")); // 클래스 선택자
            console.log($("#css-box")); // 아이디 선택자

            $('.txt').css({
                color: "red",
                fontSize: "20px",
                fontWeight: "bold"
            })
        })
    </script>

    <h3>값 조작 - html / text / value</h3>
    <div class="area" id="html-box">html</div>
    <input type="text" id="user-name" placeholder="이름 입력">
    <button id="apply-btn">적용</button>
    <script>
        $(function(){
            $("#apply-btn").click(function(){
                const name = $("#user-name").val();
                $("#html-box").html(`<span style="color:blue;">${name}</span>님 환영합니다`);
            })
        })
    </script>
</body>
</html>
