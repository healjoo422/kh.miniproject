<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .area {
            border: 1px solid #000;
            min-height: 50px;
            padding: 10px;
            margin: 3px;
        }
    </style>
</head>
<body>
    <h1>windew 객체</h1>
    <p>
        js의 최상위 객체, 브라우저에서 제공하는 전역 객체, 브라우저의 모든 기능을 제공
        location : 현재 페이지의 URL 정보를 제공하는 객체
        screeen : 브라우저의 화면 정보를 제공하는 객체
        navigator : 브라우저의 정보를 제공하는 객체
        history : 브라우저의 방문 기록을 제공하는 객체
    </p>

    <h3>비동기함수 - setTimeout, setInterval</h3>
    <button onclick="testTimeout()">2초뒤 1번 실행</button>
    <button onclick="startClock()">시계 시작</button>
    <button onclick="stopClock()">시계 정지</button>
    <div id="clock" class="area"></div>
    <script>
        function testTimeout(){
            console.log("요청시작");
            setTimeout(function(){
                console.log("2초뒤 실행");
            }, 2000);
            console.log("다음코드 실행");
        }

        let timerID = null;
        function startClock(){
            if(timerID) return;
            timerID = setInterval(function(){
                console.log("time");
                const now = new Date();
                document.querySelector("#clock").textContent =
                    `${now.getHours()}:${now.getMinutes()}:${now.getSeconds()}`;
            }, 1000);
        }

        function stopClock(){
            clearInterval(timerID);
            timerID = null;
        }
    </script>

    <h3>창 열기 / 창 닫기 - window.open, window.close</h3>
    <button onclick="openPopup()">팝업창 열기(3초뒤 닫기)</button>
    <script>
        function openPopup(){
            const popup = open("https://www.naver.com", "naver", "width=400, height=400");
            setTimeout(function(){
                popup.close();
            }, 3000);
        }
    </script>

    <h3>location 객체</h3>
    <button onclick="console.log(location)">location 정보 확인</button>
    <button onclick="location.reload()">페이지 새로고침</button>
    <button onclick="location.href = 'https://www.naver.com'">네이버 이동</button>
    <button onclick="location.assign('https://www.daum.net')">다음 이동</button>    
    <button onclick="location.replace('https://www.google.com')">구글 이동</button>

    <h4>history / screen navigator</h4>
    <button onclick="history.back()">뒤로가기</button>
    <button onclick="console.log(screen)">screen 정보 확인</button>
    <button onclick="console.log(navigator.userAgent)">navigator 정보 확인</button>


</body>
</html>
