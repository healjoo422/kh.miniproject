<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .area {
            border: 1px solid #000;
            min-height: 50px;
            padding: 10px;
            margin: 3px;
        }
    </style>

</head>
<body>
    <h1>데이터 입출력</h1>
    <!--
        window : 브라우저에서 제공하는 전역 객체
        document : window.document 객체는 브라우저에서 제공하는 전역 객체, 현재 웹 페이지의 문서(Document)를 나타냄
    -->
    
    <h3>1) 출력 - alert() / console.log() / document.write()</h3>
    <button onclick="testOutput();">출력</button>
    <script>
        function testOutput() {
            //alert("alert() 출력");
            console.log("console.log() 출력");
            document.write("document.write() 화면에 직접 출력");
        }
    </script>

    <h3>2) innerHTML / innerText</h3>
    <div id="area1" class="area">원본</div>
    <button onclick="testInnerHTML();">innerHTML</button>
    <button onclick="testInnerText();">innerText</button>
    <script>
        function testInnerHTML() {
            const area = document.querySelector('#area1');
            area.innerHTML = "<h3>innerHTML로 변경된 내용</h3>";
        }

        function testInnerText() {
            const area = document.querySelector('#area1');
            //area.innerText = "<h3>innerText로 변경된 내용</h3>";
            area.textContent = "<h3>innerText로 변경된 내용</h3>";

            // innerText와 textContent는 거의 동일하게 동작하지만
            // textContent는 CSS에 의해 숨겨진 요소의 텍스트도 가져오고(CSS로 가공 전의 원본)
            // innerText는 숨겨진 요소의 텍스트를 가져오지 않습니다.(CSS로 가공 후 가져옴)
        }
    </script>

    <h3>3) prompt()</h3>
    <button onclick="testPrompt();">prompt()</button>
    <div id="area2" class="area"></div>
    <script>
        function testPrompt(){
            const name = prompt("이름을 입력하세요.");
            const age = window.prompt("나이를 입력하세요.");
            const area2 = document.getElementById("area2");
            area2.textContent = "이름 : " + name + ", 나이 : " + age;
        }
    </script>

    <h4>4) input 요소의 value</h4>
    아이디 : <input type="text" id="user-id" placeholder="입력하세요.">
    비밀번호 : <input type="password" id="user-pw" placeholder="입력하세요.">
    <button onclick="testInput();">확인</button>
    <div id="area3" class="area"></div>
    <script>
        function testInput(){
            const idInput = document.getElementById("user-id");
            const pwInput = document.getElementById("user-pw");
            const area3 = document.getElementById("area3");
            area3.textContent = "아이디 : " + idInput.value + ", 비밀번호 : " + pwInput.value;
        }
    </script>

    <h3>5) 이미지 출력</h3>
    <button onclick="showImage();">이미지 출력</button>
    <div id="area4" class="area"></div>
    <script>
        function showImage(){
            document.getElementById("area4").innerHTML = 
                "<img src='https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/python/python-original.svg' width='100px'>";
        }
    </script>
</body>
</html>
