<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        ul{
            list-style: none;
            padding: 0;
        }
        li {
            border: 1px solid #505050;
            padding: 10px;
            margin: 3px;
        }

        li > button {
            float: right;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>
<body>
    <!--
        할 일 목록(Todo)
        1. 입력창에 내용을 적고 "추가"를 누르면 목록(`ul`)에 새 항목을 추가한다. (`createElement` + `appendChild`)
        2. 빈 값이면 추가하지 않고 안내한다.
        3. 각 항목을 클릭하면 "완료/취소"가 토글된다. (`classList` 로 취소선 스타일)
        4. 각 항목의 "삭제" 버튼으로 해당 항목을 제거한다.
        5. 항목이 동적으로 늘어나므로 **이벤트 위임**(부모 `ul`에 한 번만 등록)으로 클릭/삭제를 처리한다.
        6. 추가·삭제·완료 변경이 일어날 때마다 `localStorage`에 **JSON**으로 저장하고, 페이지 로드 시 복원한다.
    -->

    <h3>할 일 목록</h3>
    <input type="text" id="todoInput" placeholder="할 일 입력">
    <button id="addBtn">추가</button>
    <ul id="todoList"></ul>
    <script>
        const todoInput = document.querySelector("#todoInput");
        const addBtn = document.querySelector("#addBtn");
        const todoList = document.querySelector("#todoList");


        function addTodo(){
            const todoText = todoInput.value;
            if(todoText === ""){
                console.log("할 일을 입력하세요");
                return;
            }
            const li = document.createElement("li");
            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "삭제";
            li.textContent = todoText;
            li.appendChild(deleteBtn);

            todoList.appendChild(li);
        }

        function deleteTodo(event){
            if(event.target.tagName === "BUTTON"){
                const li = event.target.parentElement;
                todoList.removeChild(li);
            }
        }

        function toggleTodo(event){
            if(event.target.tagName === "LI"){
                event.target.classList.toggle("completed");
            }
        }



        function saveList(){
            const save_TodoList = [];
            const save_Items = todoList.querySelectorAll("li");
            save_Items.forEach(function(e, i){
                save_TodoList.push({
                    text: e.firstChild.textContent,
                    completed: e.classList.contains("completed")
                })
            });

            save_date = JSON.stringify(save_TodoList);
            localStorage.setItem("todoList", save_date);
        }

        function loadList(){
            const load_date = localStorage.getItem("todoList");
            if(load_date){
                const load_TodoList = JSON.parse(load_date);
                load_TodoList.forEach(function(e, i){
                    const li = document.createElement("li");
                    const deleteBtn = document.createElement("button");
                    deleteBtn.textContent = "삭제";
                    li.textContent = e.text;
                    if(e.completed){
                        li.classList.add("completed");
                    }
                    li.appendChild(deleteBtn);
                    todoList.appendChild(li);
                });
            }
        }

        loadList();
        addBtn.addEventListener("click", addTodo);
        addBtn.addEventListener("click", saveList);

        todoList.addEventListener("click", deleteTodo);
        todoList.addEventListener("click", toggleTodo);
        todoList.addEventListener("click", saveList);
    </script>
</body>
</html>
